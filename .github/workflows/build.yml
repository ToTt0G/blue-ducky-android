name: Build and Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all tags for versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlueDucky-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Determine Next Version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: versioning
        run: |
          # Default to v0.0.3 so the next increment is v0.0.4
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.3")
          
          # Remove the 'v' prefix
          VERSION=${LATEST_TAG#v}
          
          # Split semantic versioning (Major.Minor.Patch)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=${PATCH:-0}
          
          # Increment patch version
          NEXT_PATCH=$((PATCH + 1))
          NEXT_TAG="v$MAJOR.$MINOR.$NEXT_PATCH"
          
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "version=$MAJOR.$MINOR.$NEXT_PATCH" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag }}
          name: "BlueDucky alpha ${{ steps.versioning.outputs.version }}"
          body: "Automated release of BlueDucky version ${{ steps.versioning.outputs.version }}"
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
